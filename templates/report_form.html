<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Submit Price Report | Prototype</title>
    <style>
      /* Simple styling for the form */
      body {
        font-family: sans-serif;
        margin: 20px;
      }
      form {
        width: 400px;
        padding: 20px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }
      div {
        margin-bottom: 15px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      input[type="text"],
      input[type="number"] {
        width: 95%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 3px;
      }
      button {
        padding: 10px 15px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 3px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>{{ form_title if form_title else 'New Price Report Submission' }}</h1>

    <form method="POST" action="{{ url_for('submit_report') }}">
      <div>
        <label for="product_name">Product/Commodity:</label>
        <input
          type="text"
          id="product_name"
          name="product_name"
          value="{{ report.product_name if report else '' }}"
          required
        />
      </div>

      <div>
        <label for="market_location">Market/Location:</label>
        <input
          type="text"
          id="market_location"
          name="market_location"
          value="{{ report.market_location if report else '' }}"
          required
        />
      </div>

      <div>
        <label for="price">Price (NGN):</label>
        <input
          type="number"
          step="0.01"
          id="price"
          name="price"
          value="{{ report.price if report else '' }}"
          required
        />
      </div>

      <div>
        <label for="unit"
          >Unit/Value (e.g., per Kg, per Sack, Liter, e.t.c):</label
        >
        <input
          type="text"
          id="unit"
          name="unit"
          value="{{ report.unit if report else '' }}"
          required
        />
      </div>

      <button type="submit">
        {{ 'Update Report' if report else 'Submit Report' }}
      </button>
    </form>

    <p style="margin-top: 20px"><a href="/">← Back to Dashboard</a></p>
  </body>
</html>
